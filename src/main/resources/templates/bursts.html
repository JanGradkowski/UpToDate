<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bursts - UpToDate</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
        .bursts-container {
            height: 100vh;
            width: 100vw;
            max-width: 450px;
            margin: 0 auto;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
            position: relative;
        }
        .bursts-container::-webkit-scrollbar { display: none; /* Hide scrollbar Chrome */ }

        .burst-item {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .burst-video {
            height: 100%;
            width: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .burst-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 15px 80px 15px; /* Extra padding at bottom for navbar clearance */
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            box-sizing: border-box;
            pointer-events: none; /* Let clicks pass through to video to pause/play */
        }

        .burst-info { flex: 1; padding-right: 20px; pointer-events: auto; }
        .burst-username { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .burst-caption { font-size: 0.95rem; line-height: 1.3; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .burst-actions { display: flex; flex-direction: column; align-items: center; gap: 20px; pointer-events: auto; }
        .action-button { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: white; cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .action-button span { font-size: 2rem; transition: transform 0.1s ease; }
        .action-button:hover span { transform: scale(1.1); }
        .action-count { font-size: 0.8rem; font-weight: 600; margin-top: 4px; }

        .burst-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; margin-bottom: 10px; }

        /* --- THE NAVBAR CLEANUP --- */
        .feed-navbar { background: transparent !important; border: none !important; position: absolute; top: 0; width: 100%; max-width: 450px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .logo-text a { color: white !important; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        .nav-icons a, .nav-icons span { text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* Hide all navbar icons EXCEPT the Home button and the Profile Avatar */
        .nav-icons > a:not([href="/feed"]):not([href^="/profile"]),
        .nav-icons > div {
            display: none !important;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: main-navbar}"></div>

<div class="bursts-container" id="burstsContainer">
    <div id="loadingIndicator" style="height: 100vh; display: flex; align-items: center; justify-content: center; color: white;">
        <h3>Loading Bursts...</h3>
    </div>
</div>

<script th:inline="javascript">
    const csrfToken = window.csrfToken;
    let seenIds = [];
    let isFetching = false;

    document.addEventListener("DOMContentLoaded", fetchNextBatch);

    function fetchNextBatch() {
        if (isFetching) return;
        isFetching = true;

        const url = seenIds.length > 0
            ? `/api/bursts/next?seenIds=${seenIds.join(',')}`
            : `/api/bursts/next`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.length === 0 && seenIds.length === 0) {
                    document.getElementById('loadingIndicator').innerHTML = "<h3>No bursts found.</h3>";
                    return;
                }

                document.getElementById('loadingIndicator').style.display = 'none';

                data.forEach(burst => {
                    seenIds.push(burst.id);
                    appendBurstToDOM(burst);
                });

                isFetching = false;
                setupVideoObservers();
            })
            .catch(err => {
                console.error("Burst Algorithm Error:", err);
                isFetching = false;
            });
    }

    function appendBurstToDOM(burst) {
        const container = document.getElementById('burstsContainer');
        const burstDiv = document.createElement('div');
        burstDiv.className = 'burst-item';

        burstDiv.innerHTML = `
            <video class="burst-video" src="${burst.videoUrl}" loop playsinline
                   onclick="togglePlay(this.parentElement)"
                   ontimeupdate="checkCompletion(this, ${burst.id})"></video>

            <svg class="play-indicator" viewBox="0 0 24 24" fill="white" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5)); pointer-events: none; z-index: 10;">
                <path d="M8 5v14l11-7z"/>
            </svg>

            <div class="burst-overlay">
                <div class="burst-info">
                    <div class="burst-username">@${burst.username}</div>
                    <div class="burst-caption">${burst.caption}</div>
                </div>
                <div class="burst-actions">
                    <a href="/profile/${burst.username}">
                        <img src="${burst.userAvatar}" class="burst-avatar">
                    </a>
                    <button class="action-button" onclick="likeBurst(${burst.id}, this)">
                        <span style="color: ${burst.isLikedByMe ? '#ff3b30' : 'white'};">${burst.isLikedByMe ? '❤️' : '🤍'}</span>
                        <div class="action-count">${burst.likesCount}</div>
                    </button>
                    <a href="/post/${burst.id}" class="action-button" style="text-decoration: none;">
                        <span>💬</span>
                        <div class="action-count">${burst.commentsCount}</div>
                    </a>
                    <button class="action-button">
                        <span>🚀</span>
                        <div class="action-count">Share</div>
                    </button>
                </div>
            </div>
        `;
        container.appendChild(burstDiv);
    }

    function checkCompletion(video, burstId) {
        if (!video.watchCounted && video.currentTime > 0 && video.currentTime >= video.duration * 0.95) {
            video.watchCounted = true;

            fetch(`/api/bursts/${burstId}/watch`, {
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': csrfToken }
            }).catch(err => console.error("Telemetry error", err));
        }
    }

    function setupVideoObservers() {
        const videos = document.querySelectorAll('.burst-video');

        const playObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const playIcon = entry.target.parentElement.querySelector('.play-indicator');

                if (entry.isIntersecting) {
                    entry.target.play().then(() => {
                        if(playIcon) playIcon.style.display = 'none';
                    }).catch(e => {
                        console.log("Autoplay blocked by browser");
                        if(playIcon) playIcon.style.display = 'block';
                    });
                } else {
                    entry.target.pause();
                    entry.target.currentTime = 0;
                    if(playIcon) playIcon.style.display = 'none'; // Keep screen clean when swiped away
                }
            });
        }, { threshold: 0.7 });

        videos.forEach(video => playObserver.observe(video));

        if (videos.length > 0) {
            const lastVideo = videos[videos.length - 1];
            const loadMoreObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    fetchNextBatch();
                    loadMoreObserver.disconnect();
                }
            }, { threshold: 0.1 });

            loadMoreObserver.observe(lastVideo);
        }
    }

    // THE PAUSE/PLAY TOGGLE
    function togglePlay(burstItem) {
        const video = burstItem.querySelector('.burst-video');
        const playIcon = burstItem.querySelector('.play-indicator');

        if (video.paused) {
            video.play();
            playIcon.style.display = 'none';
        } else {
            video.pause();
            playIcon.style.display = 'block';
        }
    }

    function likeBurst(id, btnElement) {
        fetch(`/post/${id}/like`, {
            method: 'POST',
            headers: { 'X-CSRF-TOKEN': csrfToken }
        }).then(res => {
            if (res.ok) {
                const heartSpan = btnElement.querySelector('span');
                const countDiv = btnElement.querySelector('.action-count');
                let count = parseInt(countDiv.innerText);

                if (heartSpan.innerText === '🤍') {
                    heartSpan.innerText = '❤️';
                    heartSpan.style.color = '#ff3b30';
                    countDiv.innerText = count + 1;
                } else {
                    heartSpan.innerText = '🤍';
                    heartSpan.style.color = 'white';
                    countDiv.innerText = count - 1;
                }
            }
        });
    }
</script>
</body>
</html>
